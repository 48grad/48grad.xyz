<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>48grad.xyz</title>
<meta name="description" content="A growing collection of IT guides — networking, Linux, infrastructure as code"/>
<meta property="og:title" content="48grad.xyz"/>
<meta property="og:description" content="A growing collection of IT guides — networking, Linux, infrastructure as code"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://48grad.xyz"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/favicon.svg"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'sha256-3wn0kGckgEA9a7fAp9FmyCxmIoJUAcklNYu5CR5CHLk=' 'sha256-tk3sakn64f3TqBj3T6H/LAH3++9cUrfZkZJc1+nZIco=' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self' https://cdnjs.cloudflare.com; img-src https:; font-src 'none'"/>
<script>(function(){var s=localStorage.getItem('theme');var d=s?s==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;if(d)document.documentElement.classList.add('dark')})()</script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" integrity="sha384-odPBjvtXVM/5hOYIr3A1dB+flh0c3wAT3bSesIOqEGmyUA4JoKf/YTWy0XKOYAY7" crossorigin="anonymous"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script defer src="app.js"></script>
<style>
:root{--bg:#c8c8c4;--fg:#111;--fg2:#444;--fg3:#555;--fg4:#777;--fg5:#888;--fg6:#999;--border:#aaa;--border2:#bbb;--pre-bg:#b0b0ac;--pre-border:#888;--search-focus:#555;--mark-fg:#111}
.dark{--bg:#1a1a1a;--fg:#ccc;--fg2:#aaa;--fg3:#999;--fg4:#888;--fg5:#777;--fg6:#666;--border:#333;--border2:#444;--pre-bg:#252525;--pre-border:#555;--search-focus:#aaa;--mark-fg:#fff}
html{font-size:125%}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Courier New',Courier,monospace;font-size:1rem;line-height:1.65;transition:background .2s,color .2s}
.layout{display:flex;min-height:100vh}
.sidebar{width:max-content;min-width:180px;flex-shrink:0;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:2rem 1.2rem 1rem}
.sidebar-header{display:flex;align-items:center;gap:.8rem;margin-bottom:2rem}
.sidebar-header a{color:var(--fg);text-decoration:none;font-size:1.1rem}
.sidebar-header a:hover{text-decoration:underline}
.theme-toggle{position:relative;width:28px;height:16px;flex-shrink:0;cursor:pointer}
.theme-toggle input{display:none}
.theme-toggle span{position:absolute;inset:0;background:var(--border);border-radius:8px;transition:background .2s;font-size:8px;line-height:16px;font-family:inherit}
.theme-toggle span::before{content:'L';position:absolute;width:12px;height:12px;left:2px;top:2px;background:var(--bg);border-radius:50%;transition:transform .2s;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--fg5);font-weight:700}
.theme-toggle input:checked+span{background:var(--fg5)}
.theme-toggle input:checked+span::before{transform:translateX(12px);content:'D'}
.static-files{margin-bottom:2rem}
.search-wrap{margin-bottom:1rem}
.search-wrap input{width:100%;background:none;border:none;border-bottom:1px solid var(--border);font-family:inherit;font-size:.78rem;color:var(--fg);padding:.2rem 0;outline:none}
.search-wrap input::placeholder{color:var(--fg6)}
.search-wrap input:focus{border-bottom-color:var(--search-focus)}
.search-result-snippet{font-size:.65rem;color:var(--fg5);padding-left:.5rem}
.search-result-snippet mark{background:none;color:var(--mark-fg);font-weight:700}
.tree{font-size:.88rem;overflow-y:auto;flex-grow:1}
.tree-folder{margin-bottom:.2rem}
.tree-folder-name{display:flex;align-items:center;gap:.35rem;cursor:pointer;color:var(--fg3);text-transform:uppercase;font-size:.72rem;letter-spacing:.1em;padding:.2rem 0}
.tree-children{padding-left:.8rem;border-left:1px solid var(--border2);margin-left:.3rem;display:none}
.tree-children.open{display:block}
.tree-file{padding:.15rem 0;cursor:pointer;color:var(--fg2);font-size:.88rem}
.tree-file:hover{color:var(--fg);text-decoration:underline}
.tree-file.active{color:#c33;text-decoration:underline;font-weight:700}
.sidebar-footer{margin-top:auto;padding-top:1rem;text-align:center}
.gh-link{display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:var(--fg4);font-size:.62rem}
.gh-link svg{fill:var(--fg4);flex-shrink:0}
.gh-link:hover{color:var(--fg)}
.gh-link:hover svg{fill:var(--fg)}
.footer-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.build-info{font-size:.55rem;color:var(--fg6);white-space:nowrap}
.main{flex:1;padding:2.5rem 3rem 6rem;max-width:960px}
.breadcrumb{font-size:.7rem;color:var(--fg5);margin-bottom:1.5rem}
.content h1{font-size:1.4rem;font-weight:400;margin:1.5rem 0 .8rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.content h1:first-child{margin-top:0}
.content h2{font-size:1.15rem;font-weight:600;margin:1.5rem 0 .6rem}
.content h3{font-size:1rem;font-weight:600;margin:1.2rem 0 .4rem}
.content p{margin:0 0 1rem;line-height:1.8}
.content ul,.content ol{margin:0 0 1rem;padding-left:1.5rem}
.content li{margin-bottom:.3rem;line-height:1.7}
.content a{color:var(--fg);text-decoration:underline}
.content a:hover{color:var(--fg3)}
.content code{background:var(--pre-bg);padding:.15rem .35rem;border-radius:3px;font-size:.9em}
.content pre code{background:none;padding:0;border-radius:0;font-size:.85rem}
.content pre{background:var(--pre-bg);padding:1rem;border-left:2px solid var(--pre-border);overflow-x:auto;margin-bottom:1rem}
.content blockquote{border-left:3px solid var(--border);padding-left:1rem;margin:0 0 1rem;color:var(--fg5)}
.raw-text{white-space:pre-wrap;font-family:inherit}
.content-plain{font-size:1rem;line-height:1.8}
.content-plain p{margin-bottom:1.2rem}
.hljs{background:transparent!important;padding:0!important;color:var(--fg)!important}
.menu-btn{display:none;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--fg);padding:0;z-index:20;flex-shrink:0}
.sidebar-overlay{display:none}
@media(max-width:768px){
  html{font-size:130%}
  .menu-btn{display:block}
  .sidebar{position:fixed;left:-100%;top:0;width:100vw;height:100vh;z-index:10;background:var(--bg);transition:left .2s;border-right:none;overflow:hidden}
  .sidebar.open{left:0}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9}
  .sidebar.open~.sidebar-overlay{display:block}
  .sidebar-header{margin-top:2rem}
  .main{padding:1.2rem 1rem 4rem;max-width:100%}
  .breadcrumb{display:flex;align-items:center;gap:.5rem}
  .content pre{font-size:.8rem}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="#">48grad.xyz</a>
    </div>
    <div class="static-files">
      <div class="tree-file" data-file="README.md">README.md</div>
      <div class="tree-file" data-file="LICENSE">LICENSE</div>
    </div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search …">
    </div>
    <div class="tree" id="tree">

    <div class="sidebar-footer">

        github.com/48grad/48grad.xyz
      </a>
      <div class="footer-row">
        <span class="build-info" id="build-info"></span>
        <label class="theme-toggle" aria-label="Toggle dark mode"><input type="checkbox" id="theme-cb"><span></span></label>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>
  <main class="main" id="main">
    <button class="menu-btn">☰</button>
  </main>
</div>
</body>
</html>
