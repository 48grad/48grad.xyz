name: Cloudflare Security

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/security.yml'

jobs:
  harden:
    runs-on: ubuntu-latest
    env:
      ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      AUTH: "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
      API: "https://api.cloudflare.com/client/v4/zones"
    steps:
      - name: Apply security settings
        run: |
          call() {
            local label="$1" method="$2" endpoint="$3" data="$4"
            echo "--- $label ---"
            RESP=$(curl -s -X "$method" "$API/$ZONE/$endpoint" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "$data")
            OK=$(echo "$RESP" | jq -r '.success // false')
            if [ "$OK" = "true" ]; then echo "OK"; else echo "$RESP" | jq -r '.errors[0].message // "Unknown error"'; fi
          }

          call "SSL/TLS Strict"           PATCH "settings/ssl"               '{"value":"strict"}'
          call "Always HTTPS"             PATCH "settings/always_use_https"  '{"value":"on"}'
          call "Min TLS 1.2"              PATCH "settings/min_tls_version"   '{"value":"1.2"}'
          call "Security Level High"      PATCH "settings/security_level"    '{"value":"high"}'
          call "Browser Integrity Check"  PATCH "settings/browser_check"     '{"value":"on"}'
          call "Email Obfuscation"        PATCH "settings/email_obfuscation" '{"value":"on"}'
          call "Hotlink Protection"       PATCH "settings/hotlink_protection" '{"value":"on"}'
          call "Server Side Excludes"     PATCH "settings/server_side_exclude" '{"value":"on"}'

          call "HSTS" PATCH "settings/security_header" \
            '{"value":{"strict_transport_security":{"enabled":true,"max_age":31536000,"include_subdomains":true,"preload":true,"nosniff":true}}}'

      - name: Bot Fight Mode
        run: |
          echo "--- Bot Fight Mode ---"
          curl -s -X PUT "$API/$ZONE/bot_management" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"fight_mode":true}' | jq '{success, errors}' || echo "Not available on free plan"

      - name: Block AI scrapers (WAF rule)
        run: |
          echo "--- Block AI Crawlers ---"
          curl -s -X POST "$API/$ZONE/rulesets/phases/http_request_firewall_custom/entrypoint" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{
              "rules": [{
                "expression": "(cf.verified_bot_category eq \"AI Crawler\")",
                "action": "block",
                "description": "Block AI scrapers"
              }]
            }' | jq '{success, errors}' || echo "Rule may already exist"
