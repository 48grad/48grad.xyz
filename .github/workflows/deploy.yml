name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm run build

      - run: npx wrangler pages project create 48grad-xyz --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - run: npx wrangler pages deploy site --project-name=48grad-xyz --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set custom domain and DNS
        run: |
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Register domain in Pages project
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/48grad-xyz/domains" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"name":"48grad.xyz"}' 2>/dev/null || true

          # CNAME record (Cloudflare auto-flattens for root domain)
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"48grad.xyz","content":"48grad-xyz.pages.dev","proxied":true}' 2>/dev/null || true

      - name: Delete old deployments
        run: |
          API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/48grad-xyz/deployments"
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          IDS=$(curl -sf -H "$AUTH" "$API" | jq -r '.result | sort_by(.created_on) | reverse | .[1:][].id')

          for ID in $IDS; do
            curl -sf -X DELETE -H "$AUTH" "$API/$ID" > /dev/null && echo "Deleted $ID"
          done
