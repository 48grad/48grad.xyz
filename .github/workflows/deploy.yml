name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site/

      - run: npx wrangler pages deploy site --project-name=48grad-xyz --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  dns:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ensure custom domain and CNAME
        run: |
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/48grad-xyz/domains" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"name":"48grad.xyz"}' 2>/dev/null || true

          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"48grad.xyz","content":"48grad-xyz.pages.dev","proxied":true}' 2>/dev/null || true
