name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site/

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          OUTPUT=$(npx wrangler@3 pages deploy site --project-name=48grad-xyz --branch="$BRANCH" --commit-dirty=true 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge Cloudflare cache
        if: github.ref_name == 'main'
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

  test:
    needs: deploy
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Test preview deployment
        run: |
          URL="https://dev.48grad-xyz.pages.dev"
          echo "Testing $URL"

          # Check HTTP 200
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
          echo "HTTP Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200"; exit 1; }

          # Check security headers
          HEADERS=$(curl -sI "$URL")
          for H in "x-frame-options" "x-content-type-options" "content-security-policy" "referrer-policy"; do
            echo "$HEADERS" | grep -qi "$H" || { echo "FAIL: missing $H"; exit 1; }
            echo "OK: $H"
          done

          # Check app.js loads
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/app.js")
          echo "app.js: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: app.js not found"; exit 1; }

          # Check data.json loads
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/data.json")
          echo "data.json: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: data.json not found"; exit 1; }

          echo "All tests passed"

  dns:
    needs: deploy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure custom domain and CNAME
        run: |
          AUTH="Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/48grad-xyz/domains" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"name":"48grad.xyz"}' 2>/dev/null || true

          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"48grad.xyz","content":"48grad-xyz.pages.dev","proxied":true}' 2>/dev/null || true
